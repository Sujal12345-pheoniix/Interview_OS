version: "3.9"

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: interviewos_postgres
    environment:
      POSTGRES_USER: interviewos
      POSTGRES_PASSWORD: interviewos_dev_password
      POSTGRES_DB: interviewos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Redis Cache + Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: interviewos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Qdrant Vector Database
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: interviewos_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ============================================================
  # FastAPI Backend
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewos_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://interviewos:interviewos_dev_password@postgres:5432/interviewos
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      APP_ENV: development
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================================
  # Celery Worker (Background Jobs)
  # ============================================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewos_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://interviewos:interviewos_dev_password@postgres:5432/interviewos
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      APP_ENV: development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # ============================================================
  # Celery Beat Scheduler
  # ============================================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewos_celery_beat
    environment:
      DATABASE_URL: postgresql+asyncpg://interviewos:interviewos_dev_password@postgres:5432/interviewos
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ============================================================
  # Next.js Frontend (for production testing)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewos_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - production

  # ============================================================
  # Flower (Celery monitoring UI) - dev only
  # ============================================================
  flower:
    image: mher/flower:2.0
    container_name: interviewos_flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  default:
    name: interviewos_network
